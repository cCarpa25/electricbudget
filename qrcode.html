<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electric Budget – QR Code</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(circle at 30% 0%, #2a4666 0%, #1a2f4a 55%, #122236 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 24px;
    padding: 36px 40px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    max-width: 360px;
    width: 100%;
  }
  .logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #1e3a5f;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 28px;
  }
  .qr-img {
    width: 220px;
    height: 220px;
    border: 3px solid #F5A623;
    border-radius: 12px;
    margin-bottom: 24px;
  }
  .link {
    font-size: 12px;
    color: #1e3a5f;
    word-break: break-all;
    font-weight: 600;
    background: #f5f5f5;
    padding: 8px 12px;
    border-radius: 8px;
  }
  .instrucao {
    font-size: 12px;
    color: #aaa;
    margin-top: 16px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Electric Budget</div>
  <div class="subtitle">Escaneie para abrir o protótipo</div>
  <img
    class="qr-img"
    src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://erik-gastao.github.io/electricbudget/"
    alt="QR Code Electric Budget"
  />
  <div class="link">https://erik-gastao.github.io/electricbudget/</div>
  <div class="instrucao">Aponte a câmera do celular para o QR code</div>
</div>
</body>
</html>
